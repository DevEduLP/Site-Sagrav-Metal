        <!-- Lightbox Modal para Galeria -->
        <div id="lightbox" class="lightbox">
            <span class="lightbox-close" id="lightboxClose">&times;</span>

            <div class="lightbox-controls">
                <button id="lightboxPrev"><i class="bx bx-chevron-left"></i></button>
                <button id="lightboxZoom"><i class="bx bx-zoom-in"></i></button>

    <script>
        // MENU HAMBURGUER
        document.addEventListener("DOMContentLoaded", function () {
            const hamburger = document.getElementById("hamburger");
            const nav = document.getElementById("mainNav");
            hamburger.addEventListener("click", () => {
                nav.classList.toggle("show");
                hamburger.classList.toggle("active");
            });
        });


        const images = Array.from(document.querySelectorAll('.foto-item img'));
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxPrev = document.getElementById('lightboxPrev');
        const lightboxNext = document.getElementById('lightboxNext');
        const lightboxZoom = document.getElementById('lightboxZoom');
        let currentIndex = 0;
        let isZoomed = false;

        // Abrir Lightbox
        images.forEach((img, i) => {
            img.addEventListener('click', () => {
                currentIndex = i;
                showLightbox();
            });
        });
        function showLightbox() {
            lightbox.classList.add('open');
            isZoomed = false;
            updateLightboxImg();
        }
        function updateLightboxImg() {
            lightboxImg.src = images[currentIndex].src;
            lightboxImg.alt = images[currentIndex].alt || '';
            lightboxImg.classList.toggle('lightbox-zoomed', isZoomed);
        }
        function closeLightbox() {
            lightbox.classList.remove('open');
            setTimeout(() => { lightboxImg.src = ''; }, 180);
        }
        // Navegar
        lightboxPrev.onclick = () => {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            isZoomed = false;
            updateLightboxImg();
        };
        lightboxNext.onclick = () => {
            currentIndex = (currentIndex + 1) % images.length;
            isZoomed = false;
            updateLightboxImg();
        };
        // Zoom
        lightboxZoom.onclick = () => {
            isZoomed = !isZoomed;
            updateLightboxImg();
            // Altera ícone zoom-in/zoom-out
            lightboxZoom.innerHTML = isZoomed ?
                '<i class="bx bx-zoom-out"></i>' :
                '<i class="bx bx-zoom-in"></i>';
        };
        // Fechar
        lightboxClose.onclick = closeLightbox;
        lightbox.onclick = e => {
            if (e.target === lightbox) closeLightbox();
        };
        // Teclas: Esc fecha, <- -> navega, Z dá zoom
        document.addEventListener('keydown', function (e) {
            if (!lightbox.classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') lightboxPrev.onclick();
            if (e.key === 'ArrowRight') lightboxNext.onclick();
            if (e.key.toLowerCase() === 'z') lightboxZoom.onclick();
        });


    </script>
</body>
